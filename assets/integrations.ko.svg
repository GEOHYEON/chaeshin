  <g transform="translate(56, 198)">
    <rect width="328" height="155" rx="8" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="0.5"/>
    <text x="14" y="20" font-size="11" font-weight="600" fill="#475569">MCP Tools (4&#51333;)</text>

    <rect x="14" y="32" width="300" height="24" rx="5" fill="#FFF" stroke="#F1F5F9" stroke-width="0.5"/>
    <circle cx="26" cy="44" r="4" fill="#059669"/>
    <text x="36" y="48" font-size="10.5" font-weight="600" font-family="Consolas, Monaco, monospace" fill="#1E293B">chaeshin_retrieve</text>
    <text x="195" y="48" font-size="10" fill="#64748B">&#50976;&#49324; &#52992;&#51060;&#49828; &#44160;&#49353;</text>

    <rect x="14" y="60" width="300" height="24" rx="5" fill="#FFF" stroke="#F1F5F9" stroke-width="0.5"/>
    <circle cx="26" cy="72" r="4" fill="#059669"/>
    <text x="36" y="76" font-size="10.5" font-weight="600" font-family="Consolas, Monaco, monospace" fill="#1E293B">chaeshin_retain</text>
    <text x="180" y="76" font-size="10" fill="#64748B">&#49457;&#44277; &#54056;&#53556; &#51200;&#51109;</text>

    <rect x="14" y="88" width="300" height="24" rx="5" fill="#FFF" stroke="#F1F5F9" stroke-width="0.5"/>
    <circle cx="26" cy="100" r="4" fill="#059669"/>
    <text x="36" y="104" font-size="10.5" font-weight="600" font-family="Consolas, Monaco, monospace" fill="#1E293B">chaeshin_anticipate</text>
    <text x="205" y="104" font-size="10" fill="#64748B">&#49440;&#51228; &#51228;&#50504;</text>

    <rect x="14" y="116" width="300" height="24" rx="5" fill="#FFF" stroke="#F1F5F9" stroke-width="0.5"/>
    <circle cx="26" cy="128" r="4" fill="#059669"/>
    <text x="36" y="132" font-size="10.5" font-weight="600" font-family="Consolas, Monaco, monospace" fill="#1E293B">chaeshin_stats</text>
    <text x="170" y="132" font-size="10" fill="#64748B">&#51200;&#51109;&#49548; &#53685;&#44228;</text>
  </g>

  <!-- ══════════ RIGHT: OpenClaw ══════════ -->
  <g filter="url(#shadow)">
    <rect x="500" y="88" width="360" height="280" rx="14" fill="#FFF" stroke="#E2E8F0" stroke-width="1"/>
  </g>
  <rect x="500" y="88" width="360" height="52" rx="14" fill="url(#clawGrad)"/>
  <rect x="500" y="118" width="360" height="22" fill="url(#clawGrad)"/>
  <g transform="translate(522, 104)" fill="#FFF" opacity="0.95">
    <path d="M4,12 Q2,8 4,4 Q5,2 7,4 L8,7 Q6,9 7,12 Z"/>
    <path d="M16,12 Q18,8 16,4 Q15,2 13,4 L12,7 Q14,9 13,12 Z"/>
    <path d="M7,12 L8,16 L12,16 L13,12 Q11,14 10,14 Q9,14 7,12 Z"/>
  </g>
  <text x="546" y="121" font-size="17" font-weight="700" fill="#FFF">OpenClaw</text>
  <text x="790" y="121" font-size="10" font-weight="500" fill="#FFF" opacity="0.8">Skill + Bridge</text>

  <!-- Setup command -->
  <rect x="516" y="156" width="328" height="28" rx="6" fill="#EEF2FF" stroke="#A5B4FC" stroke-width="0.5"/>
  <text x="526" y="175" font-size="10.5" font-family="Consolas, Monaco, monospace" fill="#3730A3">pip install chaeshin &amp;&amp; chaeshin setup openclaw</text>

  <!-- Skill card -->
  <g transform="translate(516, 198)">
    <rect width="328" height="68" rx="8" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="0.5"/>
    <text x="14" y="20" font-size="11" font-weight="600" fill="#475569">SKILL.md</text>
    <text x="14" y="38" font-size="10" fill="#64748B">~/.openclaw/workspace/skills/chaeshin/</text>
    <text x="14" y="54" font-size="10" fill="#64748B">CBR &#47700;&#47784;&#47532; &#47112;&#51060;&#50612; &#8212; OpenClaw &#51088;&#46041; &#47196;&#46300;</text>
  </g>

  <!-- Bridge CLI -->
  <g transform="translate(516, 278)">
    <rect width="328" height="75" rx="8" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="0.5"/>
    <text x="14" y="20" font-size="11" font-weight="600" fill="#475569">Bridge CLI (subprocess)</text>

    <rect x="14" y="30" width="300" height="18" rx="4" fill="#FFF" stroke="#F1F5F9" stroke-width="0.5"/>
    <text x="20" y="43" font-size="10" font-family="Consolas, Monaco, monospace" fill="#4338CA">bridge retrieve "query"</text>

    <rect x="14" y="52" width="300" height="18" rx="4" fill="#FFF" stroke="#F1F5F9" stroke-width="0.5"/>
    <text x="20" y="65" font-size="10" font-family="Consolas, Monaco, monospace" fill="#4338CA">bridge retain --request "..." --graph '{...}'</text>
  </g>

  <!-- ══════════ CENTER: Shared Cases Store ══════════ -->
  <g filter="url(#shadow)">
    <rect x="320" y="410" width="260" height="90" rx="14" fill="#FFF" stroke="#E2E8F0" stroke-width="1"/>
  </g>
  <rect x="320" y="410" width="260" height="40" rx="14" fill="url(#storeGrad)"/>
  <rect x="320" y="434" width="260" height="16" fill="url(#storeGrad)"/>
  <g transform="translate(338, 420)">
    <ellipse cx="8" cy="3" rx="8" ry="3" fill="none" stroke="#FFF" stroke-width="1.5"/>
    <path d="M0,3 v8 c0,1.66 3.58,3 8,3 s8-1.34,8-3 V3" fill="none" stroke="#FFF" stroke-width="1.5"/>
    <path d="M0,7 c0,1.66 3.58,3 8,3 s8-1.34,8-3" fill="none" stroke="#FFF" stroke-width="1.2" opacity="0.6"/>
  </g>
  <text x="362" y="436" font-size="14" font-weight="700" fill="#FFF">&#44277;&#50976; &#52992;&#51060;&#49828; &#51200;&#51109;&#49548;</text>

  <text x="340" y="472" font-size="11" font-family="Consolas, Monaco, monospace" fill="#92400E">~/.chaeshin/cases.json</text>
  <text x="340" y="488" font-size="10" fill="#78716C">&#53356;&#47196;&#49828; &#54540;&#47019;&#54268; &#183; &#44160;&#49353; &amp; &#51200;&#51109;</text>

  <!-- ══════════ Connectors ══════════ -->
  <path d="M220,368 L220,395 Q220,412 235,420 L320,442" fill="none" stroke="#D97757" stroke-width="2" stroke-dasharray="6 3" marker-end="url(#arrowAmber)"/>
  <rect x="185" y="388" width="55" height="18" rx="4" fill="#FFF7ED"/>
  <text x="212" y="400" text-anchor="middle" font-size="9" font-weight="600" fill="#9A3412">stdio</text>

  <path d="M680,368 L680,395 Q680,412 665,420 L580,442" fill="none" stroke="#6366F1" stroke-width="2" stroke-dasharray="6 3" marker-end="url(#arrowAmber)"/>
  <rect x="660" y="388" width="50" height="18" rx="4" fill="#EEF2FF"/>
  <text x="685" y="400" text-anchor="middle" font-size="9" font-weight="600" fill="#3730A3">JSON</text>

  <text x="450" y="404" text-anchor="middle" font-size="10" font-weight="600" fill="#D97706">&#8644; &#44057;&#51008; cases.json &#44277;&#50976; &#8644;</text>
