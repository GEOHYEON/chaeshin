  </defs>

  <!-- Background -->
  <rect width="900" height="520" rx="16" fill="#FAFBFC"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="18" font-weight="700" fill="#1E293B">Chaeshin &#50672;&#46041; &#44396;&#51312;</text>
  <text x="450" y="58" text-anchor="middle" font-size="12" fill="#64748B">&#54616;&#45208;&#51032; &#52992;&#51060;&#49828; &#51200;&#51109;&#49548; &#8212; &#46160; &#54540;&#47019;&#54268;, &#54616;&#45208;&#51032; &#47700;&#47784;&#47532;</text>

  <!-- ══════════ LEFT: Claude Code ══════════ -->
  <g filter="url(#shadow)">
    <rect x="40" y="88" width="360" height="280" rx="14" fill="#FFF" stroke="#E2E8F0" stroke-width="1"/>
  </g>
  <rect x="40" y="88" width="360" height="52" rx="14" fill="url(#claudeGrad)"/>
  <rect x="40" y="118" width="360" height="22" fill="url(#claudeGrad)"/>
  <g transform="translate(60, 102)">
    <path d="M10 1.6 L12 6.8 L17.2 8.8 L12 10.8 L10 16 L8 10.8 L2.8 8.8 L8 6.8 Z" fill="#FFF" opacity="0.95"/>
  </g>
  <text x="86" y="121" font-size="17" font-weight="700" fill="#FFF">Claude Code</text>
  <text x="330" y="121" font-size="10" font-weight="500" fill="#FFF" opacity="0.8">MCP Server</text>

  <!-- Setup command -->
  <rect x="56" y="156" width="328" height="28" rx="6" fill="#FFF7ED" stroke="#FDBA74" stroke-width="0.5"/>
  <text x="66" y="175" font-size="10.5" font-family="Consolas, Monaco, monospace" fill="#9A3412">pip install chaeshin &amp;&amp; chaeshin setup claude-code</text>

