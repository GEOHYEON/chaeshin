<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 820" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <style>
    .bg { fill: #ffffff; }
    .title { fill: #0f172a; }
    .subtitle { fill: #64748b; }
    .label { fill: #0f172a; }
    .label-sub { fill: #64748b; }
    .desc { fill: #64748b; }

    /* Layer boxes */
    .layer-l3 { fill: #fef3c7; stroke: #f59e0b; stroke-width: 2; }
    .layer-l2 { fill: #dbeafe; stroke: #3b82f6; stroke-width: 2; }
    .layer-l1 { fill: #dcfce7; stroke: #22c55e; stroke-width: 2; }

    /* Node boxes */
    .node { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.5; rx: 8; }
    .node-fail { fill: #fee2e2; stroke: #ef4444; stroke-width: 1.5; rx: 8; }
    .node-success { fill: #dcfce7; stroke: #22c55e; stroke-width: 1.5; rx: 8; }
    .node-pending { fill: #f1f5f9; stroke: #cbd5e1; stroke-width: 1.5; rx: 8; stroke-dasharray: 4 2; }

    /* Arrows */
    .arrow { stroke: #475569; stroke-width: 1.5; fill: none; }
    .arrow-escalate { stroke: #ef4444; stroke-width: 2; fill: none; stroke-dasharray: 6 3; }
    .arrow-down { stroke: #3b82f6; stroke-width: 1.5; fill: none; }
    .arrow-success { stroke: #22c55e; stroke-width: 1.5; fill: none; }

    /* Labels */
    .layer-label { fill: #0f172a; font-weight: 700; }
    .layer-tag-l3 { fill: #92400e; font-weight: 700; }
    .layer-tag-l2 { fill: #1e40af; font-weight: 700; }
    .layer-tag-l1 { fill: #166534; font-weight: 700; }
    .escalate-label { fill: #ef4444; font-weight: 600; }
    .fix-label { fill: #22c55e; font-weight: 600; }
    .emoji { font-family: 'Apple Color Emoji', 'Segoe UI Emoji', 'Noto Color Emoji', sans-serif; }

    /* Section divider */
    .divider { stroke: #e2e8f0; stroke-width: 1; stroke-dasharray: 4 4; }

    /* Phase labels */
    .phase-box { fill: #f1f5f9; stroke: #cbd5e1; rx: 12; }
    .phase-label { fill: #475569; font-weight: 600; }

    @media (prefers-color-scheme: dark) {
      .bg { fill: #0f172a; }
      .title { fill: #e2e8f0; }
      .subtitle { fill: #94a3b8; }
      .label { fill: #e2e8f0; }
      .label-sub { fill: #94a3b8; }
      .desc { fill: #64748b; }
      .layer-l3 { fill: #422006; stroke: #d97706; }
      .layer-l2 { fill: #172554; stroke: #3b82f6; }
      .layer-l1 { fill: #052e16; stroke: #22c55e; }
      .node { fill: #1e293b; stroke: #334155; }
      .node-fail { fill: #450a0a; stroke: #ef4444; }
      .node-success { fill: #052e16; stroke: #22c55e; }
      .node-pending { fill: #1e293b; stroke: #334155; }
      .arrow { stroke: #94a3b8; }
      .arrow-escalate { stroke: #f87171; }
      .arrow-down { stroke: #60a5fa; }
      .arrow-success { stroke: #4ade80; }
      .layer-label { fill: #e2e8f0; }
      .layer-tag-l3 { fill: #fcd34d; }
      .layer-tag-l2 { fill: #93c5fd; }
      .layer-tag-l1 { fill: #86efac; }
      .escalate-label { fill: #f87171; }
      .fix-label { fill: #4ade80; }
      .divider { stroke: #334155; }
      .phase-box { fill: #1e293b; stroke: #334155; }
      .phase-label { fill: #94a3b8; }
    }
  </style>
  <defs>
    <marker id="arr" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3 L 0 6 z" fill="#475569"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3 L 0 6 z" fill="#ef4444"/>
    </marker>
    <marker id="arr-blue" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3 L 0 6 z" fill="#3b82f6"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3 L 0 6 z" fill="#22c55e"/>
    </marker>
    <filter id="sh" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="900" height="820" class="bg"/>

  <!-- ===== Title ===== -->
  <text x="450" y="32" text-anchor="middle" font-size="20" font-weight="700" class="title">Layered Execution &amp; Escalation</text>
  <text x="450" y="54" text-anchor="middle" font-size="13" class="subtitle">전체 그림을 먼저 짜고, 실행하면서 변경한다</text>

  <!-- ===== PHASE 1: Plan (Top-down) ===== -->
  <rect x="20" y="70" width="860" height="14" class="phase-box" rx="7"/>
  <text x="450" y="80" text-anchor="middle" font-size="9" class="phase-label">PHASE 1 — 계획 (Top-down: L3 → L2 → L1)</text>

  <!-- L3 Box -->
  <rect x="40" y="94" width="820" height="78" rx="12" class="layer-l3" filter="url(#sh)"/>
  <text x="60" y="116" font-size="13" class="layer-tag-l3">L3</text>
  <text x="82" y="116" font-size="13" class="layer-label">전략 — 저녁 한상 차리기</text>
  <text x="60" y="134" font-size="11" class="desc">"장 봐서 김치찌개 끓이고 밑반찬 해서 상 차려줘"</text>

  <!-- L3 nodes -->
  <rect x="80" y="144" width="110" height="22" class="node" rx="6"/>
  <text x="135" y="159" text-anchor="middle" font-size="10" class="label">장보기</text>

  <line x1="195" y1="155" x2="235" y2="155" class="arrow" marker-end="url(#arr)"/>

  <rect x="240" y="144" width="110" height="22" class="node" rx="6"/>
  <text x="295" y="159" text-anchor="middle" font-size="10" class="label">요리하기</text>

  <line x1="355" y1="155" x2="395" y2="155" class="arrow" marker-end="url(#arr)"/>

  <rect x="400" y="144" width="110" height="22" class="node" rx="6"/>
  <text x="455" y="159" text-anchor="middle" font-size="10" class="label">상차리기</text>

  <!-- L2 Boxes -->
  <!-- L2-a: 장보기 -->
  <rect x="40" y="186" width="260" height="78" rx="12" class="layer-l2" filter="url(#sh)"/>
  <text x="60" y="208" font-size="13" class="layer-tag-l2">L2</text>
  <text x="82" y="208" font-size="13" class="layer-label">장보기</text>

  <rect x="56" y="218" width="76" height="22" class="node" rx="6"/>
  <text x="94" y="233" text-anchor="middle" font-size="9" class="label">레시피 확인</text>

  <line x1="136" y1="229" x2="146" y2="229" class="arrow" marker-end="url(#arr)"/>

  <rect x="150" y="218" width="66" height="22" class="node" rx="6"/>
  <text x="183" y="233" text-anchor="middle" font-size="9" class="label">목록 작성</text>

  <line x1="220" y1="229" x2="230" y2="229" class="arrow" marker-end="url(#arr)"/>

  <rect x="234" y="218" width="56" height="22" class="node" rx="6"/>
  <text x="262" y="233" text-anchor="middle" font-size="9" class="label">구매</text>

  <!-- L2-b: 요리하기 -->
  <rect x="315" y="186" width="370" height="78" rx="12" class="layer-l2" filter="url(#sh)"/>
  <text x="335" y="208" font-size="13" class="layer-tag-l2">L2</text>
  <text x="357" y="208" font-size="13" class="layer-label">요리하기</text>

  <rect x="331" y="218" width="66" height="22" class="node" rx="6"/>
  <text x="364" y="233" text-anchor="middle" font-size="9" class="label">재료 손질</text>

  <line x1="401" y1="229" x2="411" y2="229" class="arrow" marker-end="url(#arr)"/>

  <rect x="415" y="218" width="52" height="22" class="node" rx="6"/>
  <text x="441" y="233" text-anchor="middle" font-size="9" class="label">볶기</text>

  <line x1="471" y1="229" x2="481" y2="229" class="arrow" marker-end="url(#arr)"/>

  <rect x="485" y="218" width="52" height="22" class="node" rx="6"/>
  <text x="511" y="233" text-anchor="middle" font-size="9" class="label">끓이기</text>

  <line x1="541" y1="229" x2="551" y2="229" class="arrow" marker-end="url(#arr)"/>

  <rect x="555" y="218" width="52" height="22" class="node" rx="6"/>
  <text x="581" y="233" text-anchor="middle" font-size="9" class="label">간보기</text>

  <line x1="611" y1="229" x2="621" y2="229" class="arrow" marker-end="url(#arr)"/>

  <rect x="625" y="218" width="52" height="22" class="node" rx="6"/>
  <text x="651" y="233" text-anchor="middle" font-size="9" class="label">완성</text>

  <!-- Connecting arrows L3 → L2 -->
  <line x1="135" y1="166" x2="135" y2="183" class="arrow-down" marker-end="url(#arr-blue)"/>
  <line x1="295" y1="166" x2="420" y2="183" class="arrow-down" marker-end="url(#arr-blue)"/>

  <!-- ===== Divider ===== -->
  <line x1="40" y1="284" x2="860" y2="284" class="divider"/>

  <!-- ===== PHASE 2: Execute (Bottom-up) ===== -->
  <rect x="20" y="294" width="860" height="14" class="phase-box" rx="7"/>
  <text x="450" y="304" text-anchor="middle" font-size="9" class="phase-label">PHASE 2 — 실행 (Bottom-up: L1 → L2 → L3) + 에스컬레이션</text>

  <!-- === Normal execution (left side) === -->
  <text x="230" y="332" text-anchor="middle" font-size="14" font-weight="700" class="label">정상 실행</text>
  <text x="230" y="348" text-anchor="middle" font-size="10" class="desc">L1부터 위로 올라가며 실행</text>

  <!-- L1 execute -->
  <rect x="50" y="362" width="360" height="76" rx="10" class="layer-l1" filter="url(#sh)"/>
  <text x="68" y="382" font-size="11" class="layer-tag-l1">L1 실행</text>
  <text x="120" y="382" font-size="11" class="label-sub">장보기</text>

  <rect x="66" y="392" width="76" height="22" class="node-success" rx="6"/>
  <text x="104" y="406" text-anchor="middle" font-size="9" class="label">레시피 확인 ✓</text>

  <line x1="146" y1="403" x2="158" y2="403" class="arrow-success" marker-end="url(#arr-green)"/>

  <rect x="162" y="392" width="72" height="22" class="node-success" rx="6"/>
  <text x="198" y="406" text-anchor="middle" font-size="9" class="label">목록 작성 ✓</text>

  <line x1="238" y1="403" x2="250" y2="403" class="arrow-success" marker-end="url(#arr-green)"/>

  <rect x="254" y="392" width="56" height="22" class="node-success" rx="6"/>
  <text x="282" y="406" text-anchor="middle" font-size="9" class="label">구매 ✓</text>

  <text x="340" y="427" font-size="10" class="fix-label">✓ 체크포인트</text>

  <!-- Arrow up to L2 -->
  <line x1="230" y1="362" x2="230" y2="350" class="arrow-success" marker-end="url(#arr-green)"/>

  <!-- L2 execute -->
  <rect x="50" y="448" width="360" height="80" rx="10" class="layer-l2" filter="url(#sh)"/>
  <text x="68" y="468" font-size="11" class="layer-tag-l2">L2 실행</text>
  <text x="120" y="468" font-size="11" class="label-sub">요리하기</text>

  <rect x="66" y="480" width="60" height="22" class="node-success" rx="6"/>
  <text x="96" y="494" text-anchor="middle" font-size="9" class="label">손질 ✓</text>

  <line x1="130" y1="491" x2="140" y2="491" class="arrow-success" marker-end="url(#arr-green)"/>

  <rect x="144" y="480" width="52" height="22" class="node-success" rx="6"/>
  <text x="170" y="494" text-anchor="middle" font-size="9" class="label">볶기 ✓</text>

  <line x1="200" y1="491" x2="210" y2="491" class="arrow-success" marker-end="url(#arr-green)"/>

  <rect x="214" y="480" width="52" height="22" class="node-success" rx="6"/>
  <text x="240" y="494" text-anchor="middle" font-size="9" class="label">끓이기 ✓</text>

  <line x1="270" y1="491" x2="280" y2="491" class="arrow-success" marker-end="url(#arr-green)"/>

  <rect x="284" y="480" width="52" height="22" class="node-success" rx="6"/>
  <text x="310" y="494" text-anchor="middle" font-size="9" class="label">간보기 ✓</text>

  <line x1="340" y1="491" x2="350" y2="491" class="arrow-success" marker-end="url(#arr-green)"/>

  <rect x="354" y="480" width="46" height="22" class="node-success" rx="6"/>
  <text x="377" y="494" text-anchor="middle" font-size="9" class="label">완성 ✓</text>

  <text x="340" y="517" font-size="10" class="fix-label">✓ 체크포인트</text>

  <!-- ===== Escalation (right side) ===== -->
  <text x="670" y="332" text-anchor="middle" font-size="14" font-weight="700" class="label">에스컬레이션</text>
  <text x="670" y="348" text-anchor="middle" font-size="10" class="desc">L1 실패 → L2로 올림 → L2도 실패 → 유저한테</text>

  <!-- L1 fail -->
  <rect x="470" y="362" width="390" height="100" rx="10" class="layer-l1" filter="url(#sh)"/>
  <text x="488" y="382" font-size="11" class="layer-tag-l1">L1 실행</text>
  <text x="540" y="382" font-size="11" class="label-sub">요리하기</text>

  <rect x="486" y="392" width="56" height="22" class="node-success" rx="6"/>
  <text x="514" y="406" text-anchor="middle" font-size="9" class="label">손질 ✓</text>

  <line x1="546" y1="403" x2="556" y2="403" class="arrow-success" marker-end="url(#arr-green)"/>

  <rect x="560" y="392" width="52" height="22" class="node-success" rx="6"/>
  <text x="586" y="406" text-anchor="middle" font-size="9" class="label">볶기 ✓</text>

  <line x1="616" y1="403" x2="626" y2="403" class="arrow" marker-end="url(#arr)"/>

  <rect x="630" y="392" width="60" height="22" class="node-fail" rx="6"/>
  <text x="660" y="406" text-anchor="middle" font-size="9" class="label">끓이기 ✗</text>

  <rect x="730" y="392" width="52" height="22" class="node-pending" rx="6"/>
  <text x="756" y="406" text-anchor="middle" font-size="9" class="label-sub">간보기</text>

  <rect x="800" y="392" width="46" height="22" class="node-pending" rx="6"/>
  <text x="823" y="406" text-anchor="middle" font-size="9" class="label-sub">완성</text>

  <!-- Replan attempt at L1 -->
  <rect x="576" y="424" width="144" height="28" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="648" y="438" text-anchor="middle" font-size="9" class="label-sub">L1 replan: 불 줄이고 재시도</text>
  <text x="648" y="450" text-anchor="middle" font-size="9" class="escalate-label">→ 또 실패 (냄비 바닥 탐)</text>

  <!-- Arrow from L1 fail to L2 escalation -->
  <path d="M 660 462 L 660 478" class="arrow-escalate" marker-end="url(#arr-red)"/>
  <text x="676" y="474" font-size="9" class="escalate-label">escalate!</text>

  <!-- L2 receives escalation -->
  <rect x="470" y="482" width="390" height="100" rx="10" class="layer-l2" filter="url(#sh)"/>
  <text x="488" y="502" font-size="11" class="layer-tag-l2">L2 에스컬레이션 수신</text>
  <text x="630" y="502" font-size="11" class="label-sub">요리하기</text>

  <!-- Escalation payload -->
  <rect x="486" y="510" width="186" height="44" rx="6" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <text x="496" y="523" font-size="8.5" class="label-sub">EscalationPayload:</text>
  <text x="496" y="535" font-size="8.5" class="label">  ✓ 손질, ✓ 볶기 (성공 로그)</text>
  <text x="496" y="547" font-size="8.5" class="escalate-label">  ✗ 끓이기 (실패 로그 + replan 시도)</text>

  <!-- L2 decision -->
  <rect x="686" y="510" width="160" height="44" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="696" y="523" font-size="8.5" class="label-sub">L2 replan 판단:</text>
  <text x="696" y="535" font-size="8.5" class="label">"냄비가 문제 → 찜기로 전환"</text>
  <text x="696" y="547" font-size="8.5" class="escalate-label">→ 찜기도 없음! 실패</text>

  <!-- Arrow from L2 fail to ask_user -->
  <path d="M 660 582 L 660 600" class="arrow-escalate" marker-end="url(#arr-red)"/>
  <text x="676" y="596" font-size="9" class="escalate-label">escalate!</text>

  <!-- Ask user -->
  <rect x="470" y="606" width="390" height="90" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" filter="url(#sh)"/>
  <text x="488" y="626" font-size="11" class="layer-tag-l3">ask_user</text>
  <text x="552" y="626" font-size="11" class="layer-label">유저에게 전체 체인 보여줌</text>

  <text x="488" y="644" font-size="9" class="label">[L1] 끓이기 실패 — 냄비 바닥 탐</text>
  <text x="500" y="656" font-size="9" class="label-sub">└ 시도: 불 줄이기 → 실패</text>
  <text x="488" y="670" font-size="9" class="label">[L2] 조리방법 변경 — 찜기로 전환</text>
  <text x="500" y="682" font-size="9" class="label-sub">└ 시도: 찜기 없음 → 실패</text>

  <!-- ===== Bottom: Retain ===== -->
  <line x1="40" y1="716" x2="860" y2="716" class="divider"/>

  <rect x="20" y="726" width="860" height="14" class="phase-box" rx="7"/>
  <text x="450" y="736" text-anchor="middle" font-size="9" class="phase-label">PHASE 3 — 저장 (Retain: 성공은 재사용, 실패는 경고로)</text>

  <!-- Success case -->
  <rect x="50" y="750" width="260" height="56" rx="10" class="node-success" filter="url(#sh)"/>
  <text x="68" y="770" font-size="11" class="fix-label">성공 케이스 저장</text>
  <text x="68" y="786" font-size="9" class="label">장보기 그래프 → 다음에 재사용</text>
  <text x="68" y="798" font-size="9" class="label-sub">satisfaction: 0.9 | used_count: 1</text>

  <!-- Failure case -->
  <rect x="340" y="750" width="260" height="56" rx="10" class="node-fail" filter="url(#sh)"/>
  <text x="358" y="770" font-size="11" class="escalate-label">실패 케이스 저장 (warning)</text>
  <text x="358" y="786" font-size="9" class="label">끓이기 실패 그래프 + 에스컬레이션 로그</text>
  <text x="358" y="798" font-size="9" class="label-sub">error: "냄비 바닥 탐" | success: false</text>

  <!-- Derived case -->
  <rect x="630" y="750" width="220" height="56" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" filter="url(#sh)"/>
  <text x="648" y="770" font-size="11" class="layer-tag-l2">개선 케이스 저장</text>
  <text x="648" y="786" font-size="9" class="label">유저 해결 후 새 그래프 저장</text>
  <text x="648" y="798" font-size="9" class="label-sub">derived_from: "실패 케이스 ID"</text>

  <!-- Arrow between failure and derived -->
  <line x1="604" y1="778" x2="626" y2="778" class="arrow-down" marker-end="url(#arr-blue)"/>
</svg>