<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <style>
    .bg { fill: #ffffff; }
    .title { fill: #0f172a; }
    .sub { fill: #64748b; }
    .vs { fill: #93c5fd; }
    .divider { stroke: #bfdbfe; }
    .node { fill: #f8fafc; stroke: #cbd5e1; }
    .node-text { fill: #334155; }
    .edge { stroke: #475569; }
    .edge-head { fill: #475569; }
    .dim { fill: #94a3b8; }
    .left-bg { fill: #f9fafb; stroke: #e5e7eb; }
    .left-title { fill: #9ca3af; }
    .left-node { fill: #f3f4f6; stroke: #d1d5db; }
    .left-text { fill: #9ca3af; }
    .left-result { fill: #f3f4f6; stroke: #d1d5db; }
    .right-bg { fill: #eff6ff; stroke: #93c5fd; }
    .right-title { fill: #1d4ed8; }
    .right-node { fill: #dbeafe; stroke: #60a5fa; }
    .right-text { fill: #1e40af; }
    .right-result { fill: #dbeafe; stroke: #3b82f6; }
    .cbr-node { fill: #bfdbfe; stroke: #3b82f6; }
    .cbr-text { fill: #1e3a8a; }
    .retain-node { fill: #dbeafe; stroke: #60a5fa; }
    .retain-text { fill: #1d4ed8; }
    .llm-node { fill: #fef3c7; stroke: #f59e0b; }
    .llm-text { fill: #92400e; }
    .ref-edge { stroke: #f59e0b; stroke-dasharray: 4 3; }
    .ref-head { fill: #f59e0b; }

    @media (prefers-color-scheme: dark) {
      .bg { fill: #0f172a; }
      .title { fill: #e2e8f0; }
      .sub { fill: #64748b; }
      .vs { fill: #334155; }
      .divider { stroke: #1e293b; }
      .node { fill: #1e293b; stroke: #334155; }
      .node-text { fill: #cbd5e1; }
      .edge { stroke: #64748b; }
      .edge-head { fill: #64748b; }
      .dim { fill: #475569; }
      .left-bg { fill: #1e293b; stroke: #334155; }
      .left-title { fill: #64748b; }
      .left-node { fill: #1e293b; stroke: #334155; }
      .left-text { fill: #64748b; }
      .left-result { fill: #1e293b; stroke: #334155; }
      .right-bg { fill: #1e293b; stroke: #334155; }
      .right-title { fill: #cbd5e1; }
      .right-node { fill: #1e293b; stroke: #475569; }
      .right-text { fill: #94a3b8; }
      .right-result { fill: #1e293b; stroke: #3b6b9e; }
      .cbr-node { fill: #1e293b; stroke: #3b6b9e; }
      .cbr-text { fill: #7ba3c4; }
      .retain-node { fill: #1e293b; stroke: #475569; }
      .retain-text { fill: #64748b; }
      .llm-node { fill: #292524; stroke: #b45309; }
      .llm-text { fill: #fbbf24; }
      .ref-edge { stroke: #b45309; }
      .ref-head { fill: #b45309; }
    }
  </style>
  <defs>
    <marker id="a" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="8" markerHeight="6" orient="auto"><path d="M0 0L10 3L0 6z" class="edge-head"/></marker>
    <marker id="r" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="8" markerHeight="6" orient="auto"><path d="M0 0L10 3L0 6z" class="ref-head"/></marker>
    <filter id="s"><feDropShadow dx="0" dy="1" stdDeviation="3" flood-opacity="0.1"/></filter>
  </defs>

  <rect width="800" height="800" class="bg"/>
  <text x="400" y="32" text-anchor="middle" font-size="22" font-weight="700" class="title">일반 LLM vs 채신</text>
  <text x="400" y="54" text-anchor="middle" font-size="13" class="sub">"토스트 만들어줘" — 같은 요청, 완전히 다른 결과</text>

  <line x1="400" y1="70" x2="400" y2="780" class="divider" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="400" y="86" text-anchor="middle" font-size="26" font-weight="800" class="vs">VS</text>

  <!-- ═══ LEFT — 채신 없이 ═══ -->
  <rect x="12" y="100" width="374" height="684" rx="14" class="left-bg" stroke-width="1" filter="url(#s)"/>
  <text x="199" y="128" text-anchor="middle" font-size="16" font-weight="700" class="left-title">채신 없이</text>
  <text x="199" y="146" text-anchor="middle" font-size="12" class="dim">매번 처음부터 시작</text>

  <rect x="64" y="162" width="270" height="36" rx="18" class="node" stroke-width="1"/>
  <text x="199" y="185" text-anchor="middle" font-size="13" font-weight="500" class="node-text">"치즈토스트 만들어줘"</text>

  <line x1="199" y1="198" x2="199" y2="218" class="edge" stroke-width="1.3" marker-end="url(#a)"/>

  <rect x="104" y="222" width="190" height="32" rx="7" class="left-node" stroke-width="1"/>
  <text x="199" y="243" text-anchor="middle" font-size="12" class="left-text">LLM이 처음부터 생성</text>

  <line x1="199" y1="254" x2="199" y2="274" class="edge" stroke-width="1.3" marker-end="url(#a)"/>

  <!-- Generic graph -->
  <rect x="36" y="278" width="326" height="94" rx="10" class="node" stroke-width="1"/>
  <text x="199" y="300" text-anchor="middle" font-size="13" font-weight="600" class="node-text">생성된 그래프</text>

  <rect x="56" y="314" width="80" height="32" rx="7" class="left-node" stroke-width="1"/>
  <text x="96" y="335" text-anchor="middle" font-size="12" class="left-text">식빵</text>
  <line x1="136" y1="330" x2="158" y2="330" class="edge" stroke-width="1.2" marker-end="url(#a)"/>
  <rect x="162" y="314" width="80" height="32" rx="7" class="left-node" stroke-width="1"/>
  <text x="202" y="335" text-anchor="middle" font-size="12" class="left-text">치즈올리기</text>
  <line x1="242" y1="330" x2="264" y2="330" class="edge" stroke-width="1.2" marker-end="url(#a)"/>
  <rect x="268" y="314" width="68" height="32" rx="7" class="left-node" stroke-width="1"/>
  <text x="302" y="335" text-anchor="middle" font-size="12" class="left-text">굽기</text>

  <text x="199" y="400" text-anchor="middle" font-size="12" class="dim">식빵 + 치즈 + 굽기. 끝.</text>
  <text x="199" y="418" text-anchor="middle" font-size="12" class="dim">호두 캐러멜? 버터 그릴링? 모름.</text>
  <text x="199" y="436" text-anchor="middle" font-size="12" class="dim">3중 치즈 레이어링? 없음.</text>

  <!-- Result -->
  <rect x="44" y="454" width="310" height="72" rx="10" class="left-result" stroke-width="1"/>
  <text x="199" y="484" text-anchor="middle" font-size="15" font-weight="700" class="left-title">평범한 치즈토스트</text>
  <text x="199" y="504" text-anchor="middle" font-size="12" class="dim">만족도: 2 / 5</text>

  <text x="44" y="552" font-size="12" font-weight="600" class="left-text">문제점</text>
  <text x="44" y="570" font-size="12" class="dim">기억 없음 — 매번 처음부터 생성</text>
  <text x="44" y="588" font-size="12" class="dim">김풍의 테크닉을 모름</text>
  <text x="44" y="606" font-size="12" class="dim">설탕호두, 3중 치즈 없음</text>

  <rect x="44" y="626" width="310" height="52" rx="10" class="left-node" stroke-width="1"/>
  <text x="199" y="648" text-anchor="middle" font-size="12" font-weight="600" class="left-text">다음 요청: "토스트 만들어줘"</text>
  <text x="199" y="666" text-anchor="middle" font-size="11" class="dim">또 처음부터. 발전 없음.</text>

  <!-- ═══ RIGHT — 채신 사용 ═══ -->
  <rect x="414" y="100" width="374" height="684" rx="14" class="right-bg" stroke-width="1.5" filter="url(#s)"/>
  <text x="601" y="128" text-anchor="middle" font-size="16" font-weight="700" class="right-title">채신 사용</text>
  <text x="601" y="146" text-anchor="middle" font-size="12" class="dim">성공에서 배운다. 쓸수록 좋아진다.</text>

  <rect x="466" y="162" width="270" height="36" rx="18" class="node" stroke-width="1"/>
  <text x="601" y="185" text-anchor="middle" font-size="13" font-weight="500" class="node-text">"치즈토스트 만들어줘"</text>

  <line x1="601" y1="198" x2="601" y2="218" class="edge" stroke-width="1.3" marker-end="url(#a)"/>

  <!-- Retrieve -->
  <rect x="436" y="222" width="330" height="48" rx="10" class="cbr-node" stroke-width="1.5"/>
  <text x="460" y="240" font-size="13" font-weight="700" class="cbr-text">1. 검색 (Retrieve)</text>
  <text x="460" y="258" font-size="11" class="sub">발견: "김풍 치즈듬풍토스트" (유사도: 0.87)</text>

  <line x1="601" y1="270" x2="601" y2="290" class="edge" stroke-width="1.3" marker-end="url(#a)"/>

  <!-- Retrieved graph (reference) -->
  <rect x="424" y="294" width="364" height="72" rx="10" class="right-node" stroke-width="1"/>
  <text x="601" y="316" text-anchor="middle" font-size="13" font-weight="600" class="right-text">검색된 Tool Graph</text>
  <rect x="438" y="330" width="52" height="24" rx="6" class="right-node" stroke-width="1"/>
  <text x="464" y="347" text-anchor="middle" font-size="9" class="right-text">호두졸이기</text>
  <line x1="490" y1="342" x2="506" y2="342" class="edge" stroke-width="1" marker-end="url(#a)"/>
  <rect x="510" y="330" width="52" height="24" rx="6" class="right-node" stroke-width="1"/>
  <text x="536" y="347" text-anchor="middle" font-size="9" class="right-text">버터굽기</text>
  <line x1="562" y1="342" x2="578" y2="342" class="edge" stroke-width="1" marker-end="url(#a)"/>
  <rect x="582" y="330" width="52" height="24" rx="6" class="right-node" stroke-width="1"/>
  <text x="608" y="347" text-anchor="middle" font-size="9" class="right-text">체다</text>
  <line x1="634" y1="342" x2="650" y2="342" class="edge" stroke-width="1" marker-end="url(#a)"/>
  <rect x="654" y="330" width="52" height="24" rx="6" class="right-node" stroke-width="1"/>
  <text x="680" y="347" text-anchor="middle" font-size="9" class="right-text">호두</text>
  <line x1="706" y1="342" x2="722" y2="342" class="edge" stroke-width="1" marker-end="url(#a)"/>
  <rect x="726" y="330" width="52" height="24" rx="6" class="right-node" stroke-width="1"/>
  <text x="752" y="347" text-anchor="middle" font-size="9" class="right-text">모짜렐라</text>

  <!-- Dashed arrow from Retrieved Graph to LLM Adapt (reference flow) -->
  <path d="M601 366 C601 380, 601 380, 601 394" class="ref-edge" stroke-width="1.5" fill="none" marker-end="url(#r)"/>
  <text x="614" y="384" font-size="9" class="llm-text" font-style="italic">참고하여</text>

  <!-- LLM Adapt — the key new step -->
  <rect x="436" y="398" width="330" height="56" rx="10" class="llm-node" stroke-width="1.5"/>
  <text x="460" y="418" font-size="13" font-weight="700" class="llm-text">2. LLM 적응 (Adapt)</text>
  <text x="460" y="436" font-size="11" class="llm-text">검색된 그래프를 LLM이 참고하여 생성</text>
  <text x="460" y="448" font-size="10" class="sub">현재 상황 + 보유 재료에 맞게 조정</text>

  <line x1="601" y1="454" x2="601" y2="474" class="edge" stroke-width="1.3" marker-end="url(#a)"/>

  <!-- Execute -->
  <rect x="436" y="478" width="330" height="44" rx="10" class="right-node" stroke-width="1"/>
  <text x="460" y="497" font-size="13" font-weight="600" class="right-text">3. 실행 (Execute)</text>
  <text x="460" y="513" font-size="11" class="sub">호두 졸이기 -> 버터굽기 -> 3중 치즈</text>

  <line x1="601" y1="522" x2="601" y2="542" class="edge" stroke-width="1.3" marker-end="url(#a)"/>

  <!-- Result -->
  <rect x="436" y="546" width="330" height="60" rx="10" class="right-result" stroke-width="2"/>
  <text x="601" y="572" text-anchor="middle" font-size="15" font-weight="700" class="right-title">김풍의 치즈듬풍토스트</text>
  <text x="601" y="592" text-anchor="middle" font-size="12" class="sub">만족도: 5 / 5</text>

  <line x1="601" y1="606" x2="601" y2="626" class="edge" stroke-width="1.3" marker-end="url(#a)"/>

  <!-- Retain -->
  <rect x="436" y="630" width="330" height="40" rx="10" class="retain-node" stroke-width="1"/>
  <text x="460" y="647" font-size="12" font-weight="600" class="retain-text">4. 저장 (Retain)</text>
  <text x="460" y="662" font-size="11" class="dim">CBR 저장소 기록 — 만족도 0.95</text>

  <text x="440" y="694" font-size="12" font-weight="600" class="right-text">달라진 점</text>
  <text x="440" y="712" font-size="12" class="sub">LLM이 전문가 그래프를 참고하여 생성</text>
  <text x="440" y="730" font-size="12" class="sub">설탕호두 캐러멜라이징 + 3중 치즈 레이어</text>
  <text x="440" y="748" font-size="12" class="sub">다음엔 Retain 덕분에 더 좋아진다</text>

</svg>
