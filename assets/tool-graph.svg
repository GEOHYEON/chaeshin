<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 260" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <style>
    .bg { fill: #ffffff; }
    .title { fill: #0f172a; }
    .node-fill { fill: #f8fafc; }
    .node-stroke { stroke: #cbd5e1; }
    .node-text { fill: #334155; }
    .edge { stroke: #475569; }
    .edge-head { fill: #475569; }
    .loop-edge { stroke: #475569; }
    .loop-head { fill: #475569; }
    .loop-text { fill: #64748b; }
    .done-fill { fill: #eff6ff; }
    .done-stroke { stroke: #93c5fd; }
    .done-text { fill: #1e40af; }
    .done-edge { stroke: #3b82f6; }
    .done-head { fill: #3b82f6; }
    .done-label { fill: #3b82f6; }
    .par-stroke { stroke: #94a3b8; }
    .par-text { fill: #64748b; }
    .legend { fill: #64748b; }
    .dim { fill: #94a3b8; }

    @media (prefers-color-scheme: dark) {
      .bg { fill: #0f172a; }
      .title { fill: #f1f5f9; }
      .node-fill { fill: #1e293b; }
      .node-stroke { stroke: #334155; }
      .node-text { fill: #e2e8f0; }
      .edge { stroke: #cbd5e1; }
      .edge-head { fill: #cbd5e1; }
      .loop-edge { stroke: #cbd5e1; }
      .loop-head { fill: #cbd5e1; }
      .loop-text { fill: #94a3b8; }
      .done-fill { fill: #172554; }
      .done-stroke { stroke: #1e40af; }
      .done-text { fill: #93c5fd; }
      .done-edge { stroke: #60a5fa; }
      .done-head { fill: #60a5fa; }
      .done-label { fill: #60a5fa; }
      .par-stroke { stroke: #475569; }
      .par-text { fill: #94a3b8; }
      .legend { fill: #94a3b8; }
      .dim { fill: #64748b; }
    }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3 L 0 6 z" class="edge-head"/>
    </marker>
    <marker id="arrow-loop" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3 L 0 6 z" class="loop-head"/>
    </marker>
    <marker id="arrow-done" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3 L 0 6 z" class="done-head"/>
    </marker>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="820" height="260" class="bg"/>

  <!-- Title -->
  <text x="410" y="28" text-anchor="middle" font-size="15" font-weight="600" class="title">Tool Graph — Kimchi Stew</text>

  <!-- Parallel group box -->
  <rect x="28" y="52" width="230" height="170" rx="12" fill="none" class="par-stroke" stroke-width="1.5" stroke-dasharray="6 3" opacity="0.6"/>
  <text x="143" y="72" text-anchor="middle" font-size="10" class="par-text" font-weight="500">parallel</text>

  <!-- Node: allergy_check -->
  <rect x="48" y="84" width="130" height="40" rx="8" class="node-fill node-stroke" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="113" y="108" text-anchor="middle" font-size="12" class="node-text" font-weight="500">allergy_check</text>

  <!-- Node: ingredient_check -->
  <rect x="48" y="148" width="130" height="40" rx="8" class="node-fill node-stroke" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="113" y="172" text-anchor="middle" font-size="12" class="node-text" font-weight="500">ingredient_check</text>

  <!-- Node: chop -->
  <rect x="290" y="116" width="100" height="40" rx="8" class="node-fill node-stroke" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="340" y="140" text-anchor="middle" font-size="12" class="node-text" font-weight="500">chop</text>

  <!-- Node: stir_fry -->
  <rect x="410" y="116" width="100" height="40" rx="8" class="node-fill node-stroke" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="460" y="140" text-anchor="middle" font-size="12" class="node-text" font-weight="500">stir_fry</text>

  <!-- Node: boil -->
  <rect x="530" y="116" width="100" height="40" rx="8" class="node-fill node-stroke" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="580" y="140" text-anchor="middle" font-size="12" class="node-text" font-weight="500">boil</text>

  <!-- Node: taste -->
  <rect x="650" y="116" width="100" height="40" rx="8" class="node-fill node-stroke" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="700" y="140" text-anchor="middle" font-size="12" class="node-text" font-weight="500">taste</text>

  <!-- Node: plate (done — blue accent) -->
  <rect x="700" y="48" width="100" height="40" rx="8" class="done-fill done-stroke" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="750" y="72" text-anchor="middle" font-size="12" class="done-text" font-weight="600">plate ✓</text>

  <!-- Edges: parallel → chop -->
  <line x1="178" y1="104" x2="288" y2="131" class="edge" stroke-width="1.3" marker-end="url(#arrow)"/>
  <line x1="178" y1="168" x2="288" y2="141" class="edge" stroke-width="1.3" marker-end="url(#arrow)"/>

  <!-- Edges: chop → stir_fry → boil → taste -->
  <line x1="390" y1="136" x2="408" y2="136" class="edge" stroke-width="1.3" marker-end="url(#arrow)"/>
  <line x1="510" y1="136" x2="528" y2="136" class="edge" stroke-width="1.3" marker-end="url(#arrow)"/>
  <line x1="630" y1="136" x2="648" y2="136" class="edge" stroke-width="1.3" marker-end="url(#arrow)"/>

  <!-- Edge: taste → plate (good) -->
  <path d="M 750 116 L 750 90" class="done-edge" stroke-width="1.5" fill="none" marker-end="url(#arrow-done)"/>
  <text x="764" y="106" font-size="9" class="done-label" font-weight="500">good</text>

  <!-- Loop: taste → boil (bland) -->
  <path d="M 660 156 C 660 210, 580 210, 580 158" class="loop-edge" stroke-width="1.5" fill="none" stroke-dasharray="5 3" marker-end="url(#arrow-loop)"/>
  <text x="620" y="208" text-anchor="middle" font-size="9" class="loop-text" font-weight="500">bland → boil again</text>

  <!-- Legend -->
  <line x1="48" y1="245" x2="72" y2="245" class="edge" stroke-width="1.3"/>
  <text x="78" y="249" font-size="10" class="legend">normal flow</text>
  <line x1="168" y1="245" x2="192" y2="245" class="loop-edge" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="198" y="249" font-size="10" class="legend">loop</text>
  <rect x="268" y="238" width="14" height="14" rx="3" fill="none" class="par-stroke" stroke-width="1.2" stroke-dasharray="4 2"/>
  <text x="288" y="249" font-size="10" class="legend">parallel group</text>
</svg>
