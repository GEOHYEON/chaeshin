<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 500" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <style>
    .bg { fill: #ffffff; }
    .title { fill: #0f172a; }
    .subtitle { fill: #64748b; }
    .box { fill: #f8fafc; stroke: #cbd5e1; }
    .box-accent { fill: #dbeafe; stroke: #60a5fa; }
    .box-user { fill: #f8fafc; stroke: #cbd5e1; }
    .label { fill: #0f172a; }
    .label-sub { fill: #64748b; }
    .label-accent { fill: #1d4ed8; }
    .desc { fill: #64748b; }
    .arrow { stroke: #475569; }
    .arrow-head { fill: #475569; }
    .arrow-accent { stroke: #3b82f6; }
    .arrow-accent-head { fill: #3b82f6; }
    .accent-text { fill: #3b82f6; }
    .flow-label { fill: #475569; }
    .progress-bg { fill: #f8fafc; stroke: #cbd5e1; }
    .progress-text { fill: #64748b; }

    @media (prefers-color-scheme: dark) {
      .bg { fill: #0f172a; }
      .title { fill: #e2e8f0; }
      .subtitle { fill: #94a3b8; }
      .box { fill: #1e293b; stroke: #334155; }
      .box-accent { fill: #1e293b; stroke: #3b6b9e; }
      .box-user { fill: #1e293b; stroke: #334155; }
      .label { fill: #e2e8f0; }
      .label-sub { fill: #94a3b8; }
      .label-accent { fill: #7ba3c4; }
      .desc { fill: #64748b; }
      .arrow { stroke: #64748b; }
      .arrow-head { fill: #64748b; }
      .arrow-accent { stroke: #3b6b9e; }
      .arrow-accent-head { fill: #3b6b9e; }
      .accent-text { fill: #7ba3c4; }
      .flow-label { fill: #94a3b8; }
      .progress-bg { fill: #1e293b; stroke: #334155; }
      .progress-text { fill: #64748b; }
    }
  </style>
  <defs>
    <marker id="arr" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3 L 0 6 z" class="arrow-head"/>
    </marker>
    <marker id="arr-accent" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3 L 0 6 z" class="arrow-accent-head"/>
    </marker>
    <filter id="sh" x="-2%" y="-2%" width="104%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="620" height="500" class="bg"/>

  <!-- Title -->
  <text x="310" y="30" text-anchor="middle" font-size="18" font-weight="700" class="title">Chaeshin Architecture</text>
  <text x="310" y="50" text-anchor="middle" font-size="12" class="subtitle">Retrieve → Reuse → Revise → Retain</text>

  <!-- User Request -->
  <rect x="205" y="68" width="210" height="44" rx="22" class="box-user" stroke-width="1.3" filter="url(#sh)"/>
  <text x="310" y="94" text-anchor="middle" font-size="14" class="label" font-weight="600">User Request</text>

  <!-- Arrow: User → CBR Store -->
  <line x1="310" y1="112" x2="310" y2="145" class="arrow" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- CBR Store Box -->
  <rect x="120" y="150" width="380" height="76" rx="12" class="box-accent" stroke-width="1.5" filter="url(#sh)"/>
  <text x="160" y="178" font-size="15" class="label-accent" font-weight="700">CBR Store</text>
  <text x="160" y="196" font-size="12" class="label-sub">VectorDB / JSON</text>
  <text x="380" y="175" font-size="12" class="label-accent" font-weight="600">Retrieve</text>
  <text x="380" y="192" font-size="11" class="desc">Find similar Tool Graph</text>

  <!-- Retain arrow -->
  <path d="M 90 400 L 90 188 L 118 188" class="arrow-accent" stroke-width="1.5" fill="none" stroke-dasharray="6 3" marker-end="url(#arr-accent)"/>
  <text x="30" y="300" font-size="12" class="accent-text" font-weight="600" transform="rotate(-90, 30, 300)">Retain (save success)</text>

  <!-- Arrow: CBR Store → Planner -->
  <line x1="310" y1="226" x2="310" y2="259" class="arrow" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="324" y="248" font-size="11" class="flow-label">retrieved graph</text>

  <!-- Planner Box -->
  <rect x="120" y="264" width="380" height="76" rx="12" class="box" stroke-width="1.5" filter="url(#sh)"/>
  <text x="160" y="292" font-size="15" class="label" font-weight="700">Planner</text>
  <text x="160" y="310" font-size="12" class="label-sub">LLM-powered</text>
  <text x="380" y="288" font-size="12" class="label" font-weight="600">Adapt</text>
  <text x="380" y="304" font-size="11" class="desc">Adjust to current context</text>
  <text x="380" y="326" font-size="12" class="label" font-weight="600">Replan</text>

  <!-- Arrow: Planner → Executor -->
  <line x1="310" y1="340" x2="310" y2="373" class="arrow" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="324" y="362" font-size="11" class="flow-label">final graph</text>

  <!-- Replan arrow (kept inside viewBox) -->
  <path d="M 502 400 C 530 400, 530 316, 502 316" class="arrow" stroke-width="1.5" fill="none" stroke-dasharray="5 3" marker-end="url(#arr)"/>
  <text x="538" y="360" font-size="11" class="flow-label" font-weight="500">exception</text>

  <!-- Executor Box -->
  <rect x="120" y="378" width="380" height="76" rx="12" class="box" stroke-width="1.5" filter="url(#sh)"/>
  <text x="160" y="406" font-size="15" class="label" font-weight="700">Executor</text>
  <text x="160" y="424" font-size="12" class="label-sub">Engine</text>
  <text x="380" y="402" font-size="12" class="label" font-weight="600">Execute</text>
  <text x="380" y="418" font-size="11" class="desc">Run tools node by node</text>
  <text x="380" y="440" font-size="12" class="label" font-weight="600">Advance</text>
  <text x="380" y="456" font-size="11" class="desc">Evaluate edge conditions</text>

  <!-- Progress output -->
  <rect x="210" y="468" width="200" height="26" rx="13" class="progress-bg" stroke-width="1"/>
  <text x="310" y="486" text-anchor="middle" font-size="11" class="progress-text" font-weight="500">→ Progress updates to user</text>
</svg>
