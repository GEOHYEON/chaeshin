<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 680" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <style>
    .bg { fill: #fafafa; }
    .title { fill: #111; font-size: 16px; font-weight: 600; }
    .sub { fill: #6b7280; font-size: 11px; }
    .l4 { fill: #4338ca; }
    .l3 { fill: #2563eb; }
    .l2 { fill: #0891b2; }
    .l1 { fill: #059669; }
    .lbl { fill: #ffffff; font-size: 10px; font-weight: 700; }
    .node-l4 { fill: #eef2ff; stroke: #4338ca; stroke-width: 2; rx: 8; }
    .node-l3 { fill: #eff6ff; stroke: #2563eb; stroke-width: 1.5; rx: 7; }
    .node-l2 { fill: #f0f9ff; stroke: #0891b2; stroke-width: 1.2; rx: 6; }
    .node-l1 { fill: #ecfdf5; stroke: #059669; stroke-width: 1; rx: 5; }
    .txt { fill: #111; font-size: 11px; }
    .txt-bold { fill: #111; font-size: 12px; font-weight: 600; }
    .edge { stroke: #9ca3af; stroke-width: 1.3; fill: none; }
  </style>
  <rect class="bg" width="1080" height="680"/>

  <text x="540" y="28" text-anchor="middle" class="title">3개월 생활 리셋 (만성피로 직장인) — L4 → L1 트리</text>
  <text x="540" y="46" text-anchor="middle" class="sub">생활습관 코칭 예시 · 비의료. 각 레이어가 그래프. 리프(L1)는 실행 가능한 단일 습관.</text>

  <!-- Legend -->
  <rect class="l4" x="40" y="65" width="14" height="14" rx="3"/>
  <text x="60" y="77" class="txt">L4 root</text>
  <rect class="l3" x="125" y="65" width="14" height="14" rx="3"/>
  <text x="145" y="77" class="txt">L3 composite</text>
  <rect class="l2" x="230" y="65" width="14" height="14" rx="3"/>
  <text x="250" y="77" class="txt">L2 workflow</text>
  <rect class="l1" x="335" y="65" width="14" height="14" rx="3"/>
  <text x="355" y="77" class="txt">L1 leaf</text>

  <!-- L4 root -->
  <rect class="node-l4" x="420" y="100" width="240" height="46"/>
  <rect class="l4" x="428" y="108" width="22" height="14" rx="3"/>
  <text x="439" y="119" text-anchor="middle" class="lbl">L4</text>
  <text x="540" y="131" text-anchor="middle" class="txt-bold">3개월 생활 리셋 (depth=3)</text>

  <!-- Edges L4 → L3 x4 -->
  <path class="edge" d="M 540 146 L 540 165 L 140 165 L 140 195"/>
  <path class="edge" d="M 540 146 L 540 165 L 400 165 L 400 195"/>
  <path class="edge" d="M 540 146 L 540 165 L 680 165 L 680 195"/>
  <path class="edge" d="M 540 146 L 540 165 L 940 165 L 940 195"/>

  <!-- L3 nodes -->
  <g>
    <rect class="node-l3" x="55" y="195" width="170" height="40"/>
    <rect class="l3" x="63" y="203" width="22" height="14" rx="3"/>
    <text x="74" y="214" text-anchor="middle" class="lbl">L3</text>
    <text x="140" y="220" text-anchor="middle" class="txt-bold">현재 패턴 파악</text>
  </g>
  <g>
    <rect class="node-l3" x="315" y="195" width="170" height="40"/>
    <rect class="l3" x="323" y="203" width="22" height="14" rx="3"/>
    <text x="334" y="214" text-anchor="middle" class="lbl">L3</text>
    <text x="400" y="220" text-anchor="middle" class="txt-bold">위험 · 현실성 체크</text>
  </g>
  <g>
    <rect class="node-l3" x="595" y="195" width="170" height="40"/>
    <rect class="l3" x="603" y="203" width="22" height="14" rx="3"/>
    <text x="614" y="214" text-anchor="middle" class="lbl">L3</text>
    <text x="680" y="220" text-anchor="middle" class="txt-bold">3개월 플랜 구조</text>
  </g>
  <g>
    <rect class="node-l3" x="855" y="195" width="170" height="40"/>
    <rect class="l3" x="863" y="203" width="22" height="14" rx="3"/>
    <text x="874" y="214" text-anchor="middle" class="lbl">L3</text>
    <text x="940" y="220" text-anchor="middle" class="txt-bold">이탈 방지망</text>
  </g>

  <!-- L2 under 현재 패턴 -->
  <path class="edge" d="M 140 235 L 140 260 L 75 260 L 75 290"/>
  <path class="edge" d="M 140 235 L 140 260 L 205 260 L 205 290"/>
  <rect class="node-l2" x="20" y="290" width="110" height="36"/>
  <rect class="l2" x="27" y="297" width="22" height="14" rx="3"/>
  <text x="38" y="308" text-anchor="middle" class="lbl">L2</text>
  <text x="85" y="312" text-anchor="middle" class="txt">잠 데이터 2주치</text>
  <rect class="node-l2" x="150" y="290" width="110" height="36"/>
  <rect class="l2" x="157" y="297" width="22" height="14" rx="3"/>
  <text x="168" y="308" text-anchor="middle" class="lbl">L2</text>
  <text x="215" y="312" text-anchor="middle" class="txt">에너지 일지</text>

  <!-- L2 under 위험 체크 -->
  <path class="edge" d="M 400 235 L 400 260"/>
  <rect class="node-l2" x="335" y="290" width="130" height="36"/>
  <rect class="l2" x="342" y="297" width="22" height="14" rx="3"/>
  <text x="353" y="308" text-anchor="middle" class="lbl">L2</text>
  <text x="415" y="312" text-anchor="middle" class="txt">번아웃 신호 + 실패 이력</text>

  <!-- L2 under 플랜 구조 (4개 중 3개 표시) -->
  <path class="edge" d="M 680 235 L 680 260 L 590 260 L 590 290"/>
  <path class="edge" d="M 680 235 L 680 260 L 690 260 L 690 290"/>
  <path class="edge" d="M 680 235 L 680 260 L 790 260 L 790 290"/>
  <rect class="node-l2" x="545" y="290" width="95" height="36"/>
  <rect class="l2" x="552" y="297" width="22" height="14" rx="3"/>
  <text x="563" y="308" text-anchor="middle" class="lbl">L2</text>
  <text x="605" y="312" text-anchor="middle" class="txt">잠 루틴 1개</text>
  <rect class="node-l2" x="645" y="290" width="95" height="36"/>
  <rect class="l2" x="652" y="297" width="22" height="14" rx="3"/>
  <text x="663" y="308" text-anchor="middle" class="lbl">L2</text>
  <text x="705" y="312" text-anchor="middle" class="txt">몸 쓰기 10분</text>
  <rect class="node-l2" x="745" y="290" width="95" height="36"/>
  <rect class="l2" x="752" y="297" width="22" height="14" rx="3"/>
  <text x="763" y="308" text-anchor="middle" class="lbl">L2</text>
  <text x="805" y="312" text-anchor="middle" class="txt">식사 규칙 1개</text>

  <!-- L2 under 방지망 -->
  <path class="edge" d="M 940 235 L 940 260"/>
  <rect class="node-l2" x="870" y="290" width="140" height="36"/>
  <rect class="l2" x="877" y="297" width="22" height="14" rx="3"/>
  <text x="888" y="308" text-anchor="middle" class="lbl">L2</text>
  <text x="945" y="312" text-anchor="middle" class="txt">주간 점검 + 안전 연락</text>

  <!-- L1 examples -->
  <path class="edge" d="M 605 326 L 605 360"/>
  <rect class="node-l1" x="550" y="360" width="110" height="32"/>
  <rect class="l1" x="557" y="366" width="22" height="14" rx="3"/>
  <text x="568" y="377" text-anchor="middle" class="lbl">L1</text>
  <text x="613" y="380" text-anchor="middle" class="txt">카페인 1h 전 차단</text>

  <path class="edge" d="M 705 326 L 705 360"/>
  <rect class="node-l1" x="650" y="360" width="110" height="32"/>
  <rect class="l1" x="657" y="366" width="22" height="14" rx="3"/>
  <text x="668" y="377" text-anchor="middle" class="lbl">L1</text>
  <text x="713" y="380" text-anchor="middle" class="txt">점심 걷기 10분</text>

  <path class="edge" d="M 805 326 L 805 360"/>
  <rect class="node-l1" x="750" y="360" width="110" height="32"/>
  <rect class="l1" x="757" y="366" width="22" height="14" rx="3"/>
  <text x="768" y="377" text-anchor="middle" class="lbl">L1</text>
  <text x="813" y="380" text-anchor="middle" class="txt">물+바나나 아침</text>

  <!-- Annotation -->
  <rect fill="#fff7ed" stroke="#f59e0b" stroke-width="1" rx="8" x="40" y="430" width="470" height="180"/>
  <text x="60" y="454" class="txt-bold">최소 부하 원칙</text>
  <text x="60" y="478" class="txt">이 클라이언트는 과부하 플랜으로 두 번 실패한 이력이 있다.</text>
  <text x="60" y="494" class="txt">L3 플랜 아래 네 갈래(잠·운동·식사·술)마다 L1 딱 하나씩만.</text>
  <text x="60" y="510" class="txt">"이것까지 해야 한다"는 인식을 피하는 게 지속의 관건.</text>
  <text x="60" y="540" class="txt-bold">이탈 방지망이 따로 레이어</text>
  <text x="60" y="562" class="txt">앱 기반 코칭이 실패하는 대표 지점이 "이탈 후 복귀".</text>
  <text x="60" y="578" class="txt">coach_check 월 1회 자동. 연락 끊기면 코치가 먼저 연락.</text>

  <rect fill="#f0fdf4" stroke="#059669" stroke-width="1" rx="8" x="540" y="430" width="490" height="180"/>
  <text x="560" y="454" class="txt-bold">판정은 미루고, 피드백은 계속 쌓는다</text>
  <text x="560" y="478" class="txt">· 1주차 점검에서는 성공/실패 판정 안 내린다.</text>
  <text x="560" y="494" class="txt">· 피드백만 누적 (feedback_count).</text>
  <text x="560" y="510" class="txt">· 12주 종료 시점에 코치가 L4에 최종 판정.</text>
  <text x="560" y="540" class="txt-bold">실패한 L2도 데이터가 된다</text>
  <text x="560" y="562" class="txt">"이 클라이언트에겐 헬스장 기반 플랜이 안 먹혔다"는</text>
  <text x="560" y="578" class="txt">기록이 다음 유사 클라이언트에게 warning으로 떠서</text>
  <text x="560" y="594" class="txt">같은 실수를 반복하지 않는다.</text>
</svg>
