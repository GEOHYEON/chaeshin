<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>SVG Preview — Chaeshin</title>
<style>
  body { font-family: system-ui; max-width: 950px; margin: 40px auto; padding: 20px; transition: all 0.3s; }
  body.light { background: #fff; color: #1e293b; }
  body.dark { background: #0f172a; color: #e2e8f0; }
  h2 { border-bottom: 1px solid; padding-bottom: 8px; }
  h3 { margin-top: 30px; }
  .light h2 { border-color: #e2e8f0; }
  .dark h2 { border-color: #334155; }
  .svg-box { text-align: center; margin: 20px 0; padding: 20px; border-radius: 12px; }
  .light .svg-box { border: 1px solid #e2e8f0; background: #fafafa; }
  .dark .svg-box { border: 1px solid #334155; background: #1e293b; }
  .toggle { position: fixed; top: 16px; right: 16px; padding: 8px 16px; border-radius: 8px; cursor: pointer; border: 1px solid; font-size: 14px; z-index: 10; }
  .light .toggle { background: #1e293b; color: #fff; border-color: #1e293b; }
  .dark .toggle { background: #f1f5f9; color: #0f172a; border-color: #f1f5f9; }
  .lang-tabs { display: flex; gap: 8px; margin: 10px 0; }
  .lang-tabs button { padding: 4px 12px; border-radius: 6px; border: 1px solid #cbd5e1; cursor: pointer; font-size: 13px; background: #f1f5f9; }
  .lang-tabs button.active { background: #3b82f6; color: #fff; border-color: #3b82f6; }
  .lang-en, .lang-ko { display: none; }
  .lang-en.show, .lang-ko.show { display: block; }
</style>
</head>
<body class="light">
<button class="toggle" onclick="document.body.classList.toggle('dark');document.body.classList.toggle('light');">Toggle Dark Mode</button>

<h1>Chaeshin SVG Preview</h1>

<div class="lang-tabs">
  <button class="active" onclick="switchLang('en', this)">English</button>
  <button onclick="switchLang('ko', this)">한국어</button>
</div>

<h2>Comparison — LLM vs Chaeshin</h2>
<div class="lang-en show"><div class="svg-box"><img src="comparison.svg" width="850"/></div></div>
<div class="lang-ko"><div class="svg-box"><img src="comparison.ko.svg" width="850"/></div></div>

<h2>Tool Graph</h2>
<div class="lang-en show"><div class="svg-box"><img src="tool-graph.svg" width="720"/></div></div>
<div class="lang-ko"><div class="svg-box"><img src="tool-graph.ko.svg" width="720"/></div></div>

<h2>Architecture</h2>
<div class="lang-en show"><div class="svg-box"><img src="architecture.svg" width="600"/></div></div>
<div class="lang-ko"><div class="svg-box"><img src="architecture.ko.svg" width="600"/></div></div>

<h2>Replan Scenarios</h2>
<div class="lang-en show"><div class="svg-box"><img src="replan-scenarios.svg" width="780"/></div></div>
<div class="lang-ko"><div class="svg-box"><img src="replan-scenarios.ko.svg" width="780"/></div></div>

<script>
function switchLang(lang, btn) {
  document.querySelectorAll('.lang-en, .lang-ko').forEach(el => el.classList.remove('show'));
  document.querySelectorAll('.lang-' + lang).forEach(el => el.classList.add('show'));
  document.querySelectorAll('.lang-tabs button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}
</script>
</body></html>
